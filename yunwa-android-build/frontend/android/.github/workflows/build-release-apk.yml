name: Build Android Release APK (Signed)

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g., 1.0.0)'
        required: true
        default: '1.0.0'
      version_code:
        description: 'Version code (integer)'
        required: true
        default: '1'

jobs:
  build-release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 设置 Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 12.0
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: 创建签名密钥库
        env:
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_B64 }}
        run: |
          if [ ! -z "$KEYSTORE_B64" ]; then
            echo $KEYSTORE_B64 | base64 -d > frontend/android/app/release-key.keystore
          else
            echo "未提供密钥库，将构建未签名的 APK"
          fi

      - name: 安装前端依赖
        working-directory: frontend
        run: npm ci

      - name: 构建前端
        working-directory: frontend
        run: npm run build

      - name: 同步 Capacitor
        working-directory: frontend
        run: npx cap sync android

      - name: 构建 Release APK
        working-directory: frontend/android
        run: ./gradlew assembleRelease

      - name: 上传 Release APK
        uses: actions/upload-artifact@v4
        with:
          name: yunwa-chat-release-apk
          path: frontend/android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
